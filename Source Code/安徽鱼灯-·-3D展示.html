<!-- Three.js Import Map -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
// import { OBJLoader } from 'three/addons/loaders/OBJLoader.js'; // 后续加载真实鱼灯模型时启用

/* ================================================================
   场景初始化
   ================================================================ */
const scene = new THREE.Scene();
scene.background = new THREE.Color('#080712');
scene.fog = new THREE.Fog('#080712', 8, 28);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.3, 50);
camera.position.set(3.5, 2.2, 5.5);
camera.lookAt(0, 0.6, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

/* ================================================================
   OrbitControls —— 鼠标拖拽旋转视角
   ================================================================ */
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.6, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.35;
controls.minDistance = 2.5;
controls.maxDistance = 11;
controls.maxPolarAngle = Math.PI / 2.25;
controls.minPolarAngle = 0.3;
controls.update();

/* ================================================================
   灯光
   ================================================================ */
// 环境光
const ambient = new THREE.AmbientLight('#3a2010', 0.9);
scene.add(ambient);

// 半球光 —— 模拟天空/地面
const hemi = new THREE.HemisphereLight('#ffccaa', '#1a0a04', 0.6);
scene.add(hemi);

// 主方向光（带阴影）
const keyLight = new THREE.DirectionalLight('#ffe8d0', 2.8);
keyLight.position.set(5, 8, 4);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 1024;
keyLight.shadow.mapSize.height = 1024;
keyLight.shadow.camera.near = 0.5;
keyLight.shadow.camera.far = 30;
keyLight.shadow.camera.left = -6;
keyLight.shadow.camera.right = 6;
keyLight.shadow.camera.top = 6;
keyLight.shadow.camera.bottom = -6;
keyLight.shadow.bias = -0.0004;
keyLight.shadow.normalBias = 0.02;
scene.add(keyLight);

// 暖色点光源 —— 模拟灯笼辉光
const pointLight1 = new THREE.PointLight('#ff8830', 40, 6, 1.5);
pointLight1.position.set(0, 1.4, 0.8);
pointLight1.castShadow = true;
pointLight1.shadow.mapSize.width = 512;
pointLight1.shadow.mapSize.height = 512;
pointLight1.shadow.camera.near = 0.3;
pointLight1.shadow.camera.far = 12;
pointLight1.shadow.bias = -0.003;
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight('#ffaa55', 25, 5, 2);
pointLight2.position.set(0.3, 0.7, -1.2);
scene.add(pointLight2);

const pointLight3 = new THREE.PointLight('#ffcc88', 15, 7, 2);
pointLight3.position.set(-1.2, 1.6, -0.5);
scene.add(pointLight3);

/* ================================================================
   鱼灯模型（占位：cube，后续替换为 .obj 文件）
   ================================================================ */

// —— 主立方体（鱼灯灯身） ——
const cubeGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2, 2, 2, 2);
const cubeMat = new THREE.MeshStandardMaterial({
  color: '#e07b3a',
  roughness: 0.35,
  metalness: 0.05,
  emissive: '#3d1500',
  emissiveIntensity: 0.55,
});
const cube = new THREE.Mesh(cubeGeo, cubeMat);
cube.position.set(0, 0.9, 0);
cube.castShadow = true;
cube.receiveShadow = true;
scene.add(cube);

// —— 骨架线框（模拟鱼灯竹篾结构） ——
const wireGeo = new THREE.BoxGeometry(1.34, 1.34, 1.34, 4, 4, 4);
const wireMat = new THREE.MeshBasicMaterial({
  color: '#ffaa66',
  wireframe: true,
  transparent: true,
  opacity: 0.28,
});
const wireframe = new THREE.Mesh(wireGeo, wireMat);
wireframe.position.copy(cube.position);
scene.add(wireframe);

// —— 灯笼顶部提线小环 ——
const ringGeo = new THREE.TorusGeometry(0.25, 0.04, 8, 16);
const ringMat = new THREE.MeshStandardMaterial({ color: '#cc8844', roughness: 0.3, metalness: 0.6 });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.position.set(0, 1.82, 0);
ring.rotation.x = Math.PI / 2;
ring.castShadow = true;
scene.add(ring);

// —— 灯笼穗子（底部） ——
const tasselGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.5, 8);
const tasselMat = new THREE.MeshStandardMaterial({ color: '#cc3333', roughness: 0.5, emissive: '#220000', emissiveIntensity: 0.3 });
const tassel = new THREE.Mesh(tasselGeo, tasselMat);
tassel.position.set(0, 0.05, 0);
tassel.castShadow = true;
scene.add(tassel);

const tasselBallGeo = new THREE.SphereGeometry(0.08, 8, 8);
const tasselBall = new THREE.Mesh(tasselBallGeo, tasselMat);
tasselBall.position.set(0, -0.22, 0);
scene.add(tasselBall);

// —— 主体容器（cube + wireframe + ring + tassel 同步旋转） ——
const lanternGroup = new THREE.Group();
// 将已创建的各部件移入 group
scene.remove(cube);
scene.remove(wireframe);
scene.remove(ring);
scene.remove(tassel);
scene.remove(tasselBall);
lanternGroup.add(cube);
lanternGroup.add(wireframe);
lanternGroup.add(ring);
lanternGroup.add(tassel);
lanternGroup.add(tasselBall);
lanternGroup.position.set(0, 0, 0);
scene.add(lanternGroup);

/*
  ===== 后续加载真实鱼灯 .obj 模型时，替换以上代码块 =====
  const loader = new OBJLoader();
  loader.load('fish_lantern.obj', (obj) => {
    obj.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    obj.position.set(0, 0.9, 0);
    obj.scale.set(1, 1, 1);
    scene.add(obj);
  });
*/

/* ================================================================
   粒子系统 —— 萤火/火星飘浮
   ================================================================ */
function createGlowTexture(color1, color2) {
  const size = 64;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
  gradient.addColorStop(0, color1);
  gradient.addColorStop(0.25, color2);
  gradient.addColorStop(0.6, 'rgba(80,30,0,0.08)');
  gradient.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(canvas);
}

const glowTex = createGlowTexture('rgba(255,200,100,0.95)', 'rgba(255,120,30,0.6)');

const particleCount = 260;
const particleGeo = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const colors = new Float32Array(particleCount * 3);
const sizes = new Float32Array(particleCount);

const spreadRadius = 5.5;
const spreadHeight = 4.5;
for (let i = 0; i < particleCount; i++) {
  const angle = Math.random() * Math.PI * 2;
  const radius = 1.2 + Math.random() * spreadRadius;
  positions[i * 3] = Math.cos(angle) * radius * (0.5 + Math.random() * 0.5);
  positions[i * 3 + 1] = -1.5 + Math.random() * spreadHeight;
  positions[i * 3 + 2] = Math.sin(angle) * radius * (0.5 + Math.random() * 0.5);

  // 暖色粒子：金/橙/红
  const colorChoice = Math.random();
  if (colorChoice < 0.5) {
    colors[i * 3] = 1; colors[i * 3 + 1] = 0.6 + Math.random() * 0.4; colors[i * 3 + 2] = 0.1 + Math.random() * 0.3;
  } else if (colorChoice < 0.85) {
    colors[i * 3] = 1; colors[i * 3 + 1] = 0.35 + Math.random() * 0.3; colors[i * 3 + 2] = 0.05 + Math.random() * 0.15;
  } else {
    colors[i * 3] = 1; colors[i * 3 + 1] = 0.7 + Math.random() * 0.3; colors[i * 3 + 2] = 0.4 + Math.random() * 0.3;
  }
  sizes[i] = 0.03 + Math.random() * 0.12;
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

const particleMat = new THREE.PointsMaterial({
  map: glowTex,
  size: 0.14,
  vertexColors: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  transparent: true,
  opacity: 0.75,
});

const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

/* ================================================================
   地面
   ================================================================ */
const groundGeo = new THREE.PlaneGeometry(16, 16);
const groundMat = new THREE.MeshStandardMaterial({
  color: '#0c0a12',
  roughness: 0.95,
  metalness: 0,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -1.6;
ground.receiveShadow = true;
scene.add(ground);

// 地面圆形暗影（模拟灯笼下方光晕）
const shadowGeo = new THREE.PlaneGeometry(2.5, 2.5);
const shadowCanvas = document.createElement('canvas');
shadowCanvas.width = 256;
shadowCanvas.height = 256;
const sctx = shadowCanvas.getContext('2d');
const sgrad = sctx.createRadialGradient(128, 128, 20, 128, 128, 128);
sgrad.addColorStop(0, 'rgba(255,140,40,0.35)');
sgrad.addColorStop(0.3, 'rgba(255,100,20,0.15)');
sgrad.addColorStop(0.7, 'rgba(60,20,0,0.04)');
sgrad.addColorStop(1, 'rgba(0,0,0,0)');
sctx.fillStyle = sgrad;
sctx.fillRect(0, 0, 256, 256);
const shadowTex = new THREE.CanvasTexture(shadowCanvas);
const shadowMat = new THREE.MeshBasicMaterial({
  map: shadowTex,
  blending: THREE.NormalBlending,
  depthWrite: false,
  transparent: true,
  opacity: 0.7,
});
const shadowPlane = new THREE.Mesh(shadowGeo, shadowMat);
shadowPlane.rotation.x = -Math.PI / 2;
shadowPlane.position.y = -1.58;
scene.add(shadowPlane);

/* ================================================================
   动画循环
   ================================================================ */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.1);
  const elapsed = performance.now() * 0.001;

  controls.update();

  // 鱼灯主体微微浮动
  const bob = Math.sin(elapsed * 1.2) * 0.15;
  lanternGroup.position.y = bob;
  lanternGroup.rotation.y += dt * 0.25;
  lanternGroup.rotation.x = Math.sin(elapsed * 0.7) * 0.05;

  // 粒子缓慢旋转
  particles.rotation.y += dt * 0.08;
  particles.rotation.x += dt * 0.03;

  // 点光源微微呼吸
  const breathe = 1 + Math.sin(elapsed * 1.5) * 0.2;
  pointLight1.intensity = 40 * breathe;
  pointLight2.intensity = 25 * (1 + Math.cos(elapsed * 1.8 + 1) * 0.15);

  renderer.render(scene, camera);
}
animate();

/* ================================================================
   窗口大小响应
   ================================================================ */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ================================================================
   导航菜单 & 信息弹窗交互
   ================================================================ */
const infoData = {
  intro: {
    title: '鱼灯简介',
    body: '安徽鱼灯是流传于黄山市歙县一带的传统民间灯彩艺术。以竹篾为骨架、宣纸为灯面，手工绘制鱼鳞纹样，造型生动、色彩艳丽。每逢节庆，徽州百姓举鱼灯穿行于古村巷陌，灯火流转如鱼游夜空，承载着人们对丰收与吉祥的美好祈愿。鱼灯不仅是灯，更是徽州人心中"年年有余"的朴素信仰。',
  },
  history: {
    title: '鱼灯历史',
    body: '鱼灯起源于明代，距今已有六百余年历史。相传徽州先民为祈求风调雨顺、渔业丰收，在春节和元宵期间以竹纸扎制鱼形灯笼，沿村巡游舞动。这一习俗在清代达到鼎盛，逐渐从单纯的祈福仪式演变为融舞蹈、音乐、工艺于一体的综合性民间艺术。如今，歙县汪满田村、瞻淇村等地仍保留着正月舞鱼灯的古老传统。',
  },
  craft: {
    title: '制作工艺',
    body: '一只鱼灯的制作需经破篾、扎架、糊纸、绘图、上色、上油六道核心工序。匠人精选三年以上毛竹劈成细篾，以棉线捆扎出鱼身骨架；外糊上等宣纸或绢布，再用传统工笔技法手绘鳞片、鱼眼与纹饰，色彩以大红、金黄为主调；最后刷桐油防水增亮。一只中等尺寸的鱼灯，熟练匠人也需耗费三到五日方可完成。',
  },
  heritage: {
    title: '文化传承',
    body: '安徽鱼灯已被列入非物质文化遗产名录，成为徽州文化一张亮丽的名片。近年来，歙县通过鱼灯文化节、非遗进校园、研学体验等方式推动活态传承，越来越多的年轻人开始学习扎灯技艺。鱼灯从村巷游入更广阔的舞台，在国内外文化展演中频频亮相，让这门古老的手艺在当代重焕生机。',
  },
  contact: {
    title: '联系我们',
    body: '如果您对安徽鱼灯文化感兴趣，欢迎前往黄山市歙县实地探访。每年正月期间，汪满田村和瞻淇村都会举行盛大的鱼灯巡游活动。了解更多信息或洽谈文化合作，可通过歙县文化旅游体育局官方渠道联系，或关注"徽州鱼灯"微信公众号获取最新活动资讯。',
  },
};

const overlay = document.getElementById('infoOverlay');
const infoTitle = document.getElementById('infoTitle');
const infoBody = document.getElementById('infoBody');
const infoClose = document.getElementById('infoClose');

document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', (e) => {
    e.stopPropagation();
    const topic = item.dataset.topic;
    if (infoData[topic]) {
      infoTitle.textContent = infoData[topic].title;
      infoBody.textContent = infoData[topic].body;
      overlay.classList.add('active');
    }
  });
});

function closeInfo() {
  overlay.classList.remove('active');
}
infoClose.addEventListener('click', closeInfo);
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) closeInfo();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && overlay.classList.contains('active')) closeInfo();
});
</script>
